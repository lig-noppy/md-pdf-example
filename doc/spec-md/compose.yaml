name: spec-md

services:
  md-pdf:
    image: ghcr.io/lig-noppy/md-pdf:latest
    environment:
      LANG: ${LANG:-ja_JP.UTF-8}
      LANGUAGE: ${LANGUAGE:-ja_JP:ja}
      LC_ALL: ${LC_ALL:-ja_JP.UTF-8}
    user: "${UID:-1000}:${GID:-1000}"
    volumes:
      - type: bind
        source: ${WORK_VOLUME_SOURCE:-./work}
        target: /work
